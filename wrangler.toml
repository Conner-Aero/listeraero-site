name = "listeraero-site"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2026-07-22"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

# Non-secret values only — RESEND_API_KEY is bound separately via the
# Cloudflare dashboard's Secrets Store, not committed here.
[vars]
CONTACT_TO_EMAIL = "conner@listeraero.com"
CONTACT_FROM_EMAIL = "Lister Aerospace Website <notify@mail.listeraero.com>"
